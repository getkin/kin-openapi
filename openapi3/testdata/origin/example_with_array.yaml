    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
            examples:
              bar:
                summary: A bar example with array
                value:
                  name: test
                  items:
                    - id: 1
                      label: first
                    - id: 2
                      label: second
      responses:
        "200":
          description: OK
